<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="main-body">

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-left">
      <img src="./assets/github-logo.png" alt="Logo" class="nav-logo" />
      <span class="nav-title">GitHub Issues Tracker</span>
    </div>
    <div class="navbar-right">
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
        <input type="text" id="searchInput" placeholder="Search issues..." />
        <button onclick="handleSearch()">Search</button>
      </div>
      <button class="btn-new-issue">+ New Issue</button>
    </div>
  </nav>

  
</body>
</html>
