<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Issues Tracker - Sign In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <img src="./assets/github-logo.png" alt="GitHub Logo" />
    </div>

    <!-- Title -->
    <h1 class="login-title">GitHub Issues Tracker</h1>
    <p class="login-subtitle">Sign in to manage your issues</p>

    <!-- Error Message -->
    <div class="login-error" id="loginError">
      Invalid username or password!
    </div>

    <!-- Form -->
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter Username" />
      <p class="form-hint">Default: admin</p>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter Password" />
      <p class="form-hint">Default: admin123</p>
    </div>

    <button class="btn-signin" onclick="handleLogin()">Sign In</button>

    <div class="or-divider">OR</div>

    <!-- Demo Credentials -->
    <div class="demo-creds">
      <p><strong>Demo Credentials:</strong></p>
      <p>Username: <strong>admin</strong></p>
      <p>Password: <strong>admin123</strong></p>
    </div>

</div>

<script src="login.js"></script>

</body>
</html>
